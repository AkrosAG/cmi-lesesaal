
<!DOCTYPE html>
<html lang="de" class="cmi-boot">

<head>
	<meta charset="utf-8"/>
	<meta http-equiv="x-ua-compatible" content="ie=edge"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title id="lesesaal-header-title"> </title>

	<!-- Favicons -->
	<link rel="shortcut icon" href="assets/img/ico/favicon.ico"/>
	<link rel="apple-touch-icon" sizes="57x57" href="assets/img/ico/apple-touch-icon-57x57.png"/>
	<link rel="apple-touch-icon" sizes="114x114" href="assets/img/ico/apple-touch-icon-114x114.png"/>
	<link rel="apple-touch-icon" sizes="72x72" href="assets/img/ico/apple-touch-icon-72x72.png"/>
	<link rel="apple-touch-icon" sizes="144x144" href="assets/img/ico/apple-touch-icon-144x144.png"/>
	<link rel="apple-touch-icon" sizes="60x60" href="assets/img/ico/apple-touch-icon-60x60.png"/>
	<link rel="apple-touch-icon" sizes="120x120" href="assets/img/ico/apple-touch-icon-120x120.png"/>
	<link rel="apple-touch-icon" sizes="76x76" href="assets/img/ico/apple-touch-icon-76x76.png"/>
	<link rel="icon" type="image/png" href="assets/img/ico/favicon-96x96.png" sizes="96x96"/>
	<link rel="icon" type="image/png" href="assets/img/ico/favicon-16x16.png" sizes="16x16"/>
	<link rel="icon" type="image/png" href="assets/img/ico/favicon-32x32.png" sizes="32x32"/>
	<link rel="stylesheet" type="text/css" href="assets/css/fonts.css"/>

	<script defer src="assets/fontawesome/js/all.js"></script>
	<script defer src="assets/fontawesome/js/fontawesome.js"></script>
	<script src="config/js/loading-texts.js"></script>
	<link defer rel="stylesheet" href="config/css/loading-site.css"/>
	<link defer rel="stylesheet" href="config/css/custom.css"/>
</head>

<body>

<ul class="access-keys">
	<li><a id="startseiteAccessKey" href="#" accesskey="0">Startseite</a></li>
	<li>
		<a id="hauptnavigationAccessKey" href="javascript:setFocusOnEnter('mainNav');" accesskey="1">Hauptnavigation</a>
	</li>
	<li><a id="inhaltAccessKey" href="javascript:setFocusOnEnter('mainContent');" accesskey="2">Inhalt</a></li>
</ul>
<cmi-viaduc-root>
	<div class="cmi-loader cmi-visible">
		<h3>
			<span id="lesesaal-text-01"></span>
			<br/>
			<span id="lesesaal-text-02"> </span>
			<br/>
			<span id="lesesaal-text-03"> </span>
			<br/>
			<span id="lesesaal-text-04"> </span>
			<br/>
		</h3>
		<div id="lesesaal-three-dots" class="loading-cmi-three-dots" >
			<span ></span><span></span><span></span>
		</div>
		<div><img id="lesesaal-ing-01" src="assets/img/logo.svg" onerror="this.onerror = null; this.src = './assets/img/logo.png'" ></div>
		<span class="sr-only" id="pageLoadingMessage">
				Seite wird geladen, La page est en chargement, La pagina si
				sta caricando, Page is loading
			</span>

		<script>
			document.getElementById("lesesaal-header-title").innerHTML  = loadingTexts["lesesaal-header-title"];
			document.getElementById("lesesaal-text-01").innerHTML  = loadingTexts["lesesaal-text-01"];
			document.getElementById("lesesaal-text-02").innerHTML  = loadingTexts["lesesaal-text-02"];
			document.getElementById("lesesaal-text-03").innerHTML  = loadingTexts["lesesaal-text-03"];
			document.getElementById("lesesaal-text-04").innerHTML  = loadingTexts["lesesaal-text-04"];

			function setFocusOnEnter(elementId) {
				document.getElementById(elementId).focus();
			}

			var x = document.getElementById('pageLoadingMessage');
			x.setAttribute("tabindex", 1);
			x.focus()

			var $buoop = {
				required: { e: -4, f: -3, o: -3, s: -1, c: -3 },
				reminder: 0, // Nach wieviel Stunden die Meldung wieder auftaucht. 0 = show all the time
				reminderClosed: 336, // Falls der Benutzer die Meldung explizit schliesst, erscheint diese wieder nach x Stunden
				no_permanent_hide: false, // Um den erneuten Erinnerungsmeldungszeitpunkt anzuzeigen, muss dies "false" sein
				test: false,
				style: "top",
				insecure: true,
				unsupported: true,
				api: 2021.08,
				text: {
					'msg': "Your web browser ({brow_name}) is out of date.",
					'msgmore': "Update your browser or use a different browser.",
					'remind': "You will be reminded next time in {days} days",
					'bignore': 'X'
				},
				text_in_de: {
					'msg': "Ihr Webbrowser ({brow_name}) ist veraltet.",
					'msgmore': "Aktualisieren Sie Ihren Browser oder verwenden Sie einen anderen Browser.",
					'remind': 'Sie werden das nächste Mal in {days} Tagen erinnert.',
					'bignore': 'X'
				},
				text_in_fr: {
					'msg': "Votre navigateur web ({brow_name}) n\'est pas à jour.",
					'msgmore': "Mettez-le à jour ou choisissez un autre navigateur.",
					'remind': 'Vous serez rappelé la prochaine fois dans {days} jours.',
					'bignore': 'X'
				},
				text_in_it: {
					'msg': "Il tuo browser ({brow_name}) non è aggiornato.",
					'msgmore': "Aggiorna il tuo browser o usa un altro browser.",
					'remind': 'Ti verrà ricordato la prossima volta tra {days} giorni.',
					'bignore': 'X'
				}
			};

			function $buo_f() {
				var e = document.createElement("script");
				e.src = "//browser-update.org/update.min.js";
				document.body.appendChild(e);
			};
			try {
				document.addEventListener("DOMContentLoaded", $buo_f, false)
			} catch (e) {
				window.attachEvent("onload", $buo_f)
			}

		</script>
	</div>
</cmi-viaduc-root>
</body>

</html>
