				<cmi-viaduc-simple-search (onSearch)="onSearch($event)"></cmi-viaduc-simple-search>

	</div>

	<div class="row">

			<cmi-collection-overview [parentId]="null" [centerContent]="true" [headerText]="'Sammlungen' | translate: 'collections.header'"></cmi-collection-overview>
