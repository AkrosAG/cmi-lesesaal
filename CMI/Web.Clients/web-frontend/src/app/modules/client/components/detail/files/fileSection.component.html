<div class="file-section" *ngIf="entity">
	<div class="row" *ngFor="let file of files;">
		<div class="col col-xs-2">
			<label>
				<span>{{file.extension}}</span>
			</label>
		</div>
		<div class="col col-xs-10">
			<label>
				<span>{{file.filename}}</span>
			</label>
			<label>
				<span>{{file.sizeInBytes}}</span>
			</label>
		</div>
	</div>
</div>
