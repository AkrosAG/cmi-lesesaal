name: CMI Lesesaal Release Build (Full)

on:
  workflow_dispatch:
    inputs:
        comment:
          description: 'Bemerkung'
          required: false
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build-frontend-client:
    runs-on: ubuntu-latest
    env:
      WORKING_DIR: ./CMI/Web.Clients/web-frontend
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup Node 12.x
      uses: actions/setup-node@v1
      with:
        node-version: '12.x'
        
    - name: Cache node modules
      uses: actions/cache@v1
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Dependencies
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        npm config set //www.myget.org/F/cmiag-nuget/npm/:_authToken $NPM_AUTH_TOKEN
        npm i
      env:
        NPM_AUTH_TOKEN: ${{ secrets.MYGET_PUSH_APIKEY }}

    - name: Test
      working-directory: ${{ env.WORKING_DIR }}
      run: npm run test-github
      
    - name: Build
      working-directory: ${{ env.WORKING_DIR }}
      run: npm run build-prod
      
    - name: Save Dist
      uses: actions/upload-artifact@v2
      with:
        name: frontend-client
        path: ${{ env.WORKING_DIR }}/dist/**
        retention-days: 1

  build-management-client:
    runs-on: ubuntu-latest
    env:
      WORKING_DIR: ./CMI/Web.Clients/web-management
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup Node 12.x
      uses: actions/setup-node@v1
      with:
        node-version: '12.x'
        
    - name: Cache node modules
      uses: actions/cache@v1
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Install Dependencies
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        npm config set //www.myget.org/F/cmiag-nuget/npm/:_authToken $NPM_AUTH_TOKEN
        npm i
      env:
        NPM_AUTH_TOKEN: ${{ secrets.MYGET_PUSH_APIKEY }}

    - name: Test
      working-directory: ${{ env.WORKING_DIR }}
      run: npm run test-github
      
    - name: Build
      working-directory: ${{ env.WORKING_DIR }}
      run: npm run build-prod
      
    - name: Save Dist
      uses: actions/upload-artifact@v2
      with:
        name: management-client
        path: ${{ env.WORKING_DIR }}/dist/**
        retention-days: 1

  build-services:
    needs: [build-frontend-client, build-management-client]
    runs-on: windows-latest
    env:
      SOLUTION: cmi-lesesaal.sln
      ON_BUILDSERVER: 'True'
    outputs:
      version: ${{ env.GitBuildVersion }}
      tagExists: ${{ steps.checkTag.outputs.exist }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1
        
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.0.5
        
      - name: Restore Nugets
        run: nuget restore ${{ env.SOLUTION }}
        
      - name: Build Services
        run: msbuild ${{ env.SOLUTION }} /t:Rebuild /p:Configuration=Release 
        
      - name: Publish Frontend API
        run: msbuild "${{ github.workspace }}\CMI\Web\CMI.Web.Frontend\CMI.Web.Frontend.csproj" /p:Configuration=Release /p:Platform=AnyCPU /t:WebPublish /p:WebPublishMethod=FileSystem /p:ExcludeApp_Data=True /p:DeleteExistingFiles=True /p:publishUrl="${{ github.workspace }}\frontendartefacts"
            
      - name: Publish Management API
        run: msbuild "${{ github.workspace }}\CMI\Web\CMI.Web.Management\CMI.Web.Management.csproj" /p:Configuration=Release /p:Platform=AnyCPU /t:WebPublish /p:WebPublishMethod=FileSystem /p:ExcludeApp_Data=True /p:DeleteExistingFiles=True /p:publishUrl="${{ github.workspace }}\managementartefacts"
                     
      - name: Test and Cover
        shell: pwsh
        run: |
          Invoke-WebRequest "https://download.jetbrains.com/resharper/dotUltimate.2021.2.1/JetBrains.dotCover.CommandLineTools.2021.2.1.zip" -OutFile "dotcover.zip"
          Expand-Archive -Path dotcover.zip -DestinationPath .\dotcover
          $assemblies = (ls -r Test\*\**\bin\release\*.Tests.dll | where-object { $_.FullName -notlike "*.Performance.Tests.dll" } | % { $_.FullName } | sort-object -Unique)
          .\dotcover\dotCover.exe cover /TargetExecutable="packages\NUnit.ConsoleRunner.3.14.0\tools\nunit3-console.exe" /TargetArguments="$assemblies" /Filters=+:CMI.* /Output="./coverage/services_coverage.html" /ReportType="HTML"
      
      - name: Save Coverage
        uses: actions/upload-artifact@v2
        with:
          name: lesesaal-services-coverage
          path: ./coverage/**
          retention-days: 10
        
      - name: Restore Frontend from artifacts
        uses: actions/download-artifact@v2
        with:
          path: ./frontendartefacts/client
          name: frontend-client
                
      - name: Restore Management from artifacts
        uses: actions/download-artifact@v2
        with:
          path: ./managementartefacts/client
          name: management-client
          
      - name: Create Version
        uses: dotnet/nbgv@v0.4.0
        id: nbgv
        with:
          path: ./
          
      - uses: mukunku/tag-exists-action@v1.0.0
        id: checkTag
        with: 
          tag: v.${{ env.GitBuildVersion }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create Package
        shell: pwsh
        run: |
          .\BuildServices\createZipFile.ps1 -BuildConfiguration "Release" -DogFoodPath "${{ github.workspace }}\BuildResult" -SolutionDir "${{ github.workspace }}" -BuildNumber ${{ env.GitBuildVersion }}
          
      - name: Save Dist
        uses: actions/upload-artifact@v2
        with:
          name: lesesaal.complete.${{ env.GitBuildVersion }}
          path: ${{ github.workspace }}\BuildResult\Complete\lesesaal.complete.${{ env.GitBuildVersion }}.zip

  release:
    needs: build-services
    runs-on: ubuntu-latest
    steps:
      - name: Restore Build artifact
        uses: actions/download-artifact@v2
        with:
          path: ./complete
          name: lesesaal.complete.${{ needs.build-services.outputs.version }}
          
      - name: Create Lesesaal Release on GitHub
        id: create_release
        uses: actions/create-release@v1
        if: ${{ needs.build-services.outputs.tagExists == false }}
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commitish: ${{ github.event.inputs.branch || 'develop' }}
          tag_name: v.${{ needs.build-services.outputs.version }}
          release_name: v.${{ needs.build-services.outputs.version }}
          draft: false
          prerelease: ${{ contains('develop', github.event.inputs.branch || 'develop') }}
          
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        if: ${{ needs.build-services.outputs.tagExists == false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./complete/lesesaal.complete.${{ needs.build-services.outputs.version }}.zip
          asset_name: ${{ needs.build-services.outputs.version }}.zip
          asset_content_type: application/zip