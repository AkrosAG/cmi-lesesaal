name: CMI Lesesaal Release Build (Full)

on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Gewünschter Branch (in allen Repositories)'
        required: true
        default: 'develop'

jobs:
  build-services:
    runs-on: windows-latest
    env:
      SOLUTION: cmi-lesesaal.sln
      ON_BUILDSERVER: 'True'
    outputs:
      version: ${{ env.GitBuildVersion }}
      tagExists: ${{ steps.checkTag.outputs.exist }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1
        
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.0.5
        
      - name: Restore Nugets
        run: nuget restore ${{ env.SOLUTION }}
        
      - name: Build Services
        run: msbuild ${{ env.SOLUTION }} /t:Rebuild /p:Configuration=Release 
        
      - name: Publish Frontend API
        run: msbuild "${{ github.workspace }}\CMI\Web\CMI.Web.Frontend\CMI.Web.Frontend.csproj" /p:Configuration=Release /p:Platform=AnyCPU /t:WebPublish /p:WebPublishMethod=FileSystem /p:ExcludeApp_Data=True /p:DeleteExistingFiles=True /p:publishUrl="${{ github.workspace }}\frontendartefacts"
            
      - name: Publish Management API
        run: msbuild "${{ github.workspace }}\CMI\Web\CMI.Web.Management\CMI.Web.Management.csproj" /p:Configuration=Release /p:Platform=AnyCPU /t:WebPublish /p:WebPublishMethod=FileSystem /p:ExcludeApp_Data=True /p:DeleteExistingFiles=True /p:publishUrl="${{ github.workspace }}\managementartefacts"
                     
      - name: Test and Cover
        shell: pwsh
        run: |
          Invoke-WebRequest "https://download.jetbrains.com/resharper/dotUltimate.2021.2.1/JetBrains.dotCover.CommandLineTools.2021.2.1.zip" -OutFile "dotcover.zip"
          Expand-Archive -Path dotcover.zip -DestinationPath .\dotcover
          $assemblies = (ls -r Test\*\**\bin\release\*.Tests.dll | where-object { $_.FullName -notlike "*.Performance.Tests.dll" } | % { $_.FullName } | sort-object -Unique)
          .\dotcover\dotCover.exe cover /TargetExecutable="packages\NUnit.ConsoleRunner.3.14.0\tools\nunit3-console.exe" /TargetArguments="$assemblies" /Filters=+:CMI.* /Output="./coverage/services_coverage.html" /ReportType="HTML"
      
      - name: Save Coverage
        uses: actions/upload-artifact@v2
        with:
          name: lesesaal-services-coverage
          path: ./coverage/**
          retention-days: 10
        
      - name: Restore Frontend from artifacts
        uses: actions/download-artifact@v2
        with:
          path: ./frontendartefacts/client
          name: frontend-client
                
      - name: Restore Management from artifacts
        uses: actions/download-artifact@v2
        with:
          path: ./managementartefacts/client
          name: management-client
          
      - name: Create Version
        uses: dotnet/nbgv@v0.4.0
        id: nbgv
        with:
          path: ./vservices/
          
      - uses: mukunku/tag-exists-action@v1.0.0
        id: checkTag
        with: 
          tag: v.${{ env.GitBuildVersion }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create Package
        working-directory: ./vservices
        shell: pwsh
        run: |
          .\BuildServices\createZipFile.ps1 -BuildConfiguration "Release" -DogFoodPath "${{ github.workspace }}\vservices\BuildResult" -SolutionDir "${{ github.workspace }}\vservices" -BuildNumber ${{ env.GitBuildVersion }}
          
      - name: Save Dist
        uses: actions/upload-artifact@v2
        with:
          name: viaduc.complete.${{ env.GitBuildVersion }}
          path: ${{ github.workspace }}\vservices\BuildResult\Complete\viaduc.complete.${{ env.GitBuildVersion }}.zip